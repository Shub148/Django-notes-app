version: "3.8"

services:
  django_app:
    image: shub800/notes-app:latest
    container_name: django_cont
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always
    networks:
      - notes-app-nw

  db:
    image: mysql:8.0
    container_name: db_cont
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
    volumes:
      - ./data/mysql/db:/var/lib/mysql
    networks:
      - notes-app-nw

networks:
  notes-app-nw:
